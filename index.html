<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glare Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Geist+Mono:wght@300;400&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="app">
    <header id="hud">
      <span id="wordmark">Glare</span>
      <div id="hudright">
        <div id="dot"></div>
        <span id="timer">00:00</span>
        <button id="recbtn">Record</button>
        <button id="stopbtn" disabled>Stop</button>
      </div>
    </header>
    <div id="stage">
      <video id="preview" autoplay muted playsinline></video>
      <div id="hint">Click while recording to add zooms</div>
    </div>
    <div id="editor" class="gone">
      <div id="editmain">
        <canvas id="output"></canvas>
      </div>
      <div id="sidebar">
        <div class="block">
          <span class="lbl">style</span>
          <div id="presets">
            <button class="preset active" data-c1="#f8f8f6" data-c2="#eceae5" data-ang="135">Clean</button>
            <button class="preset" data-c1="#f5f7fb" data-c2="#dfe7f5" data-ang="120">Mist</button>
            <button class="preset" data-c1="#fff7ed" data-c2="#fde7d1" data-ang="135">Warm</button>
            <button class="preset" data-c1="#111827" data-c2="#334155" data-ang="140">Slate</button>
          </div>
          <div class="colorrow">
            <input type="color" id="bgcol1" value="#f8f8f6" />
            <span class="lbl" style="margin:0">→</span>
            <input type="color" id="bgcol2" value="#eceae5" />
          </div>
          <div class="row" style="margin-top:10px">
            <span class="lbl" style="margin:0">angle</span>
            <span class="val" id="bgangval">135°</span>
          </div>
          <input type="range" id="bgang" min="0" max="360" value="135" step="1" />
        </div>
        <div class="block">
          <div class="row"><span class="lbl">corner radius</span><span class="val" id="rval">24</span></div>
          <input type="range" id="rinput" min="0" max="44" value="24" step="1" />
        </div>
        <div class="block">
          <div class="row"><span class="lbl">padding</span><span class="val" id="pval">76</span></div>
          <input type="range" id="pinput" min="0" max="140" value="76" step="4" />
        </div>
        <div class="block">
          <div class="row"><span class="lbl">shadow blur</span><span class="val" id="sval">46</span></div>
          <input type="range" id="sinput" min="0" max="100" value="46" step="1" />
        </div>
        <div class="block">
          <div class="row"><span class="lbl">shadow opacity</span><span class="val" id="soval">26</span></div>
          <input type="range" id="soinput" min="0" max="80" value="26" step="1" />
        </div>
        <div class="block">
          <div class="row"><span class="lbl">zoom level</span><span class="val" id="zval">2.6×</span></div>
          <input type="range" id="zinput" min="1.2" max="4" value="2.6" step=".1" />
        </div>
        <div class="block">
          <div class="row"><span class="lbl">inset scale</span><span class="val" id="ival">94%</span></div>
          <input type="range" id="iinput" min="60" max="100" value="94" step="1" />
        </div>
        <div class="block">
          <span class="lbl">aspect ratio</span>
          <div id="ratios">
            <button class="ratio active" data-r="16/9">16:9</button>
            <button class="ratio" data-r="4/3">4:3</button>
            <button class="ratio" data-r="1/1">1:1</button>
            <button class="ratio" data-r="9/16">9:16</button>
          </div>
        </div>
        <div class="block">
          <span class="lbl">export</span>
          <div id="exportbtns">
            <button id="dlwebm">WebM</button>
            <button id="dlmp4">MP4</button>
          </div>
          <div id="prog" class="gone">
            <div id="progbar"></div>
          </div>
          <span id="progtxt" class="lbl gone" style="margin-top:6px">preparing...</span>
        </div>
        <button id="again">New recording</button>
      </div>
    </div>
    <div id="tline" class="gone">
      <div id="tbar">
        <button id="playbtn">Play</button>
        <span id="tcode">0:00 / 0:00</span>
        <button id="addzoom">Add zoom</button>
      </div>
      <div id="track">
        <div id="wave"></div>
        <div id="tfill"></div>
        <div id="triml" class="handle"></div>
        <div id="trimr" class="handle"></div>
        <div id="phead"></div>
        <div id="zdots"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
